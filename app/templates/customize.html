{% extends "base.html" %}

{% block content %}
<div class="w-full max-w-xl">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">

        <!-- Video Preview -->
        <div class="mb-6 border-b border-gray-700 pb-4">
            <img src="{{ video.thumbnail }}" class="w-full rounded-lg mb-3">
            <h3 class="text-lg font-semibold">{{ video.title }}</h3>
        </div>

        <form action="/start-processing" method="POST" class="space-y-5">
            <input type="hidden" name="video_url" value="{{ video.url }}">

            <!-- Silence Threshold -->
            <div>
                <label class="block font-semibold mb-1">Silence Threshold (dB)</label>
                <input 
                    type="number" 
                    name="db_threshold" 
                    value="-30" 
                    step="1"
                    class="w-full bg-gray-900 border border-gray-700 rounded-md p-2"
                >
                <p class="text-xs text-gray-500 mt-1">
                    • Below -40 dB → usually true background noise / silence
                    <br>• -40 to -30 dB → soft speech, breaths, room tone
                    <br>• Above -30 dB → clear speech
                </p>
            </div>

            <!-- Speed -->
            <div>
                <label class="block font-semibold mb-1">Playback Speedup (x)</label>
                <div class="flex items-center gap-3">
                    <input 
                        type="range" 
                        name="speed" 
                        min="0.5" 
                        max="4" 
                        step="0.1"
                        value="1.5"
                        oninput="this.nextElementSibling.value = this.value"
                        class="w-full"
                    >
                    <output class="text-sm text-gray-300">1.5</output>
                </div>
            </div>

            <!-- Min Silence -->
            <div>
                <label class="block font-semibold mb-1">Minimum Silence Duration (sec)</label>
                <input 
                    type="number" 
                    name="min_silence" 
                    value="0.5" 
                    step="0.1"
                    class="w-full bg-gray-900 border border-gray-700 rounded-md p-2"
                >
            </div>

            <!-- Submit -->
            <button 
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 transition py-3 rounded-lg font-bold"
            >
                Start Auto-Edit
            </button>
        </form>

    </div>
</div>
{% endblock %}
