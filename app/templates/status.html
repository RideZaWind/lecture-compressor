<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Your Lecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-3xl w-full">
        <div id="status-display" 
             hx-get="/status-poll/{{ video_id }}" 
             hx-trigger="every 5s" 
             hx-swap="outerHTML"
             class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700 text-center">
            
            <div class="flex flex-col items-center">
                <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-6"></div>
                
                <h1 class="text-2xl font-bold mb-2">Compressing Your Lecture...</h1>
                <p class="text-gray-400">
                    We're currently cutting silences and speeding things up. 
                    This page will update automatically.
                </p>
                
                <p class="mt-4 text-xs text-gray-500 uppercase tracking-widest">
                    Job ID: <span class="font-mono">{{ video_id }}</span>
                </p>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-blue-400 transition">
                &larr; Cancel and go back
            </a>
        </div>
    </div>

</body>
</html>
