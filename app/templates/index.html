{% extends "base.html" %}

{% block content %}
<div class="w-full max-w-xl">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700 text-center">

        <h1 class="text-2xl font-bold mb-2">Process Lecture Video</h1>
        <p class="text-gray-400 mb-6">
            Enter a YouTube URL to remove silence and optimize playback.
        </p>

        <form action="/" method="POST">
            <div class="flex gap-2 bg-gray-900 border border-gray-700 rounded-lg p-2 focus-within:border-blue-500">
                <input 
                    type="url" 
                    name="youtube_url" 
                    placeholder="Paste YouTube link here..." 
                    required
                    class="flex-1 bg-transparent outline-none px-2 text-white placeholder-gray-500"
                >
                <button 
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 transition px-4 py-2 rounded-md font-semibold"
                >
                    Process
                </button>
            </div>
        </form>

        <p class="mt-4 text-xs text-gray-500">
            Your video will be saved to the processing queue.
        </p>

    </div>
</div>
{% endblock %}
