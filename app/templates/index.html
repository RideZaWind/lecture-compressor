<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Processor | Auto-Edit Lectures</title>
    <style>
        /* [Your provided CSS variables and Tailwind resets go here] */
        :root {
            --primary: #6367f1;
            --primary-dark: #4f46e5;
            --white: #fff;
            --light-gray: #f8fafc;
            --line-color: #e2e4e6;
        }

        body {
            font-family: ui-sans-serif, system-ui, sans-serif;
            background-color: var(--light-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .converter-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
            border: 2px solid var(--line-color);
            border-radius: 0.5rem;
            padding: 0.25rem;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--primary);
        }

        input[type="url"] {
            flex: 1;
            padding: 0.75rem 1rem;
            outline: none;
            border: none;
            font-size: 1rem;
        }

        button[type="submit"] {
            background-color: var(--primary);
            color: var(--white);
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 600;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-dark);
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        p {
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="converter-card">
        <h1>Process Lecture Video</h1>
        <p>Enter a YouTube URL to remove silence and optimize playback.</p>

        <form action="/" method="POST">
            <div class="input-group">
                <input 
                    type="url" 
                    name="youtube_url" 
                    placeholder="Paste YouTube link here..." 
                    required
                >
                <button type="submit">Process</button>
            </div>
        </form>
        
        <div style="margin-top: 1rem; font-size: 0.875rem; color: #9ca3af;">
            Your video will be saved to the processing queue.
        </div>
    </div>

</body>
</html>
