name: Python CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Spin up MongoDB for database tests
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      # Spin up Redis for Celery tests
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        # We'll use pytest to run our test suite
        pytest
      env:
        MONGO_URI: mongodb://localhost:27017
        REDIS_URL: redis://localhost:6379/0